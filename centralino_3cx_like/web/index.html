<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Centralino Web</title>
</head>
<body>
  <h1>Telefono SIP (1001)</h1>
  <button onclick="call()">Chiama 1002</button>
  <button onclick="hangup()">Termina</button>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jssip/3.7.2/jssip.min.js"></script>
  <script>
    const socket = new JsSIP.WebSocketInterface('ws://' + location.hostname + ':8089/ws');
    const config = {
      sockets  : [ socket ],
      uri      : 'sip:1001@' + location.hostname,
      password : '1001'
    };
    const ua = new JsSIP.UA(config);
    ua.start();
    let session;

    function call() {
      session = ua.call('sip:1002@' + location.hostname, {
        mediaConstraints: { audio: true, video: false }
      });
    }

    function hangup() {
      if (session) session.terminate();
    }
  </script>
</body>
</html>
